<!--
  TEMPLATE HALAMAN KONTEN ALC
  Cara pakai:
  1. Salin file ini ke folder keilmiahan atau keprofesian.
  2. Ganti href CSS/JS jika lokasi folder berbeda.
  3. Buat file data baru di folder data, misalnya data/beasiswa.js.
  4. Ganti baris <script src="../data/asai.js"></script> ke file data baru.
-->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Template halaman konten Actuarial Learning Center HIMASAKTA ITS.">
  <title>Template Konten | ALC HIMASAKTA ITS</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Lewati ke konten utama</a>

  <header class="site-header">
    <nav class="navbar container" aria-label="Navigasi utama">
      <a class="brand" href="../index.html" aria-label="Beranda ALC">
        <span class="brand-mark" aria-hidden="true">ALC</span>
        <span>
          <strong>Actuarial Learning Center</strong>
          <small>HIMASAKTA ITS</small>
        </span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Buka menu" aria-expanded="false" data-nav-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-links" data-nav-menu>
        <a href="../index.html" data-nav-link>Beranda</a>
        <a href="../keilmiahan/asai.html" data-nav-link>Keilmiahan</a>
        <a href="../keprofesian/magang.html" data-nav-link>Keprofesian</a>
        <a href="../panduan.html" data-nav-link>Panduan</a>
      </div>
    </nav>
  </header>

  <main class="content-layout container" id="main-content">
    <aside class="sidebar" aria-label="Navigasi kategori">
      <p class="sidebar-title">Kategori</p>
      <a href="../keilmiahan/asai.html">ASAI</a>
      <a href="../keprofesian/magang.html">Magang</a>
    </aside>

    <section class="content-main" aria-labelledby="content-title">
      <div class="page-heading">
        <p class="eyebrow" data-content-eyebrow>Label</p>
        <h1 id="content-title" data-content-title>Judul Halaman</h1>
        <p data-content-description>Deskripsi singkat halaman akan diisi dari file data.</p>
      </div>

      <div class="content-toolbar" aria-label="Pencarian konten">
        <label class="field">
          <span>Cari</span>
          <input type="search" placeholder="Cari konten..." data-search-input>
        </label>
        <label class="field">
          <span>Kategori</span>
          <select data-category-filter></select>
        </label>
      </div>

      <div class="result-meta" data-result-meta aria-live="polite"></div>
      <div class="card-grid content-results" data-content-grid></div>
      <p class="empty-state" data-empty-state hidden>Belum ada konten yang cocok.</p>
    </section>
  </main>

  <script src="../data/asai.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/content-page.js"></script>
</body>
</html>
